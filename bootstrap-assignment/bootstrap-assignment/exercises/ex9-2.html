<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex 9.2 – Button Groups & Toggle Buttons</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <h1 class="display-5 fw-bold mb-4">Exercise 9.2 – Button Groups & Toggle Buttons</h1>

    <!-- Basic btn-group -->
    <h5>Basic btn-group</h5>
    <div class="btn-group mb-4" role="group" aria-label="Basic example">
      <button type="button" class="btn btn-primary">Left</button>
      <button type="button" class="btn btn-primary">Middle</button>
      <button type="button" class="btn btn-primary">Right</button>
    </div>

    <!-- Outline btn-group -->
    <h5>Outline btn-group</h5>
    <div class="btn-group mb-4" role="group" aria-label="Outlined group">
      <button type="button" class="btn btn-outline-secondary">Day</button>
      <button type="button" class="btn btn-outline-secondary">Week</button>
      <button type="button" class="btn btn-outline-secondary">Month</button>
      <button type="button" class="btn btn-outline-secondary">Year</button>
    </div>

    <!-- btn-group-vertical -->
    <h5>Vertical btn-group-vertical</h5>
    <div class="btn-group-vertical mb-4" role="group" aria-label="Vertical group">
      <button type="button" class="btn btn-outline-primary">Option A</button>
      <button type="button" class="btn btn-outline-primary">Option B</button>
      <button type="button" class="btn btn-outline-primary">Option C</button>
    </div>

    <!-- Toolbar (multiple groups) -->
    <h5>btn-toolbar with multiple groups</h5>
    <div class="btn-toolbar mb-4" role="toolbar" aria-label="Toolbar example">
      <div class="btn-group me-2" role="group">
        <button type="button" class="btn btn-secondary">1</button>
        <button type="button" class="btn btn-secondary">2</button>
        <button type="button" class="btn btn-secondary">3</button>
      </div>
      <div class="btn-group me-2" role="group">
        <button type="button" class="btn btn-secondary">4</button>
        <button type="button" class="btn btn-secondary">5</button>
        <button type="button" class="btn btn-secondary">6</button>
      </div>
      <div class="btn-group" role="group">
        <button type="button" class="btn btn-info">7</button>
      </div>
    </div>

    <!-- Checkbox toggle buttons -->
    <h5>Checkbox Toggle Buttons</h5>
    <div class="btn-group mb-4" role="group" aria-label="Checkbox toggle buttons">
      <input type="checkbox" class="btn-check" id="chk1" autocomplete="off" />
      <label class="btn btn-outline-success" for="chk1">Bold</label>

      <input type="checkbox" class="btn-check" id="chk2" autocomplete="off" />
      <label class="btn btn-outline-success" for="chk2">Italic</label>

      <input type="checkbox" class="btn-check" id="chk3" autocomplete="off" checked />
      <label class="btn btn-outline-success" for="chk3">Underline</label>
    </div>

    <!-- Radio toggle buttons -->
    <h5>Radio Toggle Buttons</h5>
    <div class="btn-group mb-4" role="group" aria-label="Radio toggle buttons">
      <input type="radio" class="btn-check" name="view" id="list" autocomplete="off" checked />
      <label class="btn btn-outline-primary" for="list">List View</label>

      <input type="radio" class="btn-check" name="view" id="grid" autocomplete="off" />
      <label class="btn btn-outline-primary" for="grid">Grid View</label>

      <input type="radio" class="btn-check" name="view" id="table" autocomplete="off" />
      <label class="btn btn-outline-primary" for="table">Table View</label>
    </div>

    <!-- Sized groups -->
    <h5>Sized Groups</h5>
    <div class="btn-group btn-group-lg mb-2" role="group">
      <button type="button" class="btn btn-outline-dark">Large</button>
      <button type="button" class="btn btn-outline-dark">Group</button>
    </div><br/>
    <div class="btn-group btn-group-sm" role="group">
      <button type="button" class="btn btn-outline-dark">Small</button>
      <button type="button" class="btn btn-outline-dark">Group</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
