<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex 8.2 – Floating Login Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%); min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
          <div class="card-body p-4">
            <div class="text-center mb-4">
              <h4 class="fw-bold">Welcome Back</h4>
              <p class="text-muted small">Sign in to your account</p>
            </div>

            <form novalidate>
              <!-- form-floating: label floats above input when focused/filled -->
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="floatEmail"
                       placeholder="name@example.com" required />
                <label for="floatEmail">Email address</label>
              </div>

              <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatPassword"
                       placeholder="Password" required />
                <label for="floatPassword">Password</label>
              </div>

              <!-- Remember me + forgot -->
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember" />
                  <label class="form-check-label small" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none">Forgot password?</a>
              </div>

              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Sign In</button>

              <hr class="my-4" />

              <p class="text-center text-muted small mb-0">
                Don't have an account? <a href="ex8-1.html" class="text-decoration-none">Register</a>
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
