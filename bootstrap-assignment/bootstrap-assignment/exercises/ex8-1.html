<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ex 8.1 – Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow">
          <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Create an Account</h4>
          </div>
          <div class="card-body p-4">
            <form novalidate>

              <!-- Name row -->
              <div class="row g-3 mb-3">
                <div class="col-sm-6">
                  <label for="firstName" class="form-label">First Name</label>
                  <input type="text" class="form-control" id="firstName" placeholder="John" required />
                </div>
                <div class="col-sm-6">
                  <label for="lastName" class="form-label">Last Name</label>
                  <input type="text" class="form-control" id="lastName" placeholder="Doe" required />
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text">@</span>
                  <input type="email" class="form-control" id="email" placeholder="john@example.com" required />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="password" placeholder="Min. 8 characters" required />
                  <button class="btn btn-outline-secondary" type="button" id="togglePwd">Show</button>
                </div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat password" required />
              </div>

              <!-- Phone with input-group -->
              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <div class="input-group">
                  <span class="input-group-text">+1</span>
                  <input type="tel" class="form-control" id="phone" placeholder="555 000 1234" />
                </div>
              </div>

              <!-- Select country -->
              <div class="mb-3">
                <label for="country" class="form-label">Country</label>
                <select class="form-select" id="country" required>
                  <option value="" selected disabled>Choose country...</option>
                  <option>United States</option>
                  <option>United Kingdom</option>
                  <option>Canada</option>
                  <option>Australia</option>
                  <option>India</option>
                </select>
              </div>

              <!-- Gender radios -->
              <div class="mb-3">
                <label class="form-label d-block">Gender</label>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="male" value="male" />
                  <label class="form-check-label" for="male">Male</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="female" value="female" />
                  <label class="form-check-label" for="female">Female</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="gender" id="other" value="other" />
                  <label class="form-check-label" for="other">Other</label>
                </div>
              </div>

              <!-- Interests checkboxes -->
              <div class="mb-3">
                <label class="form-label d-block">Interests</label>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="tech" />
                  <label class="form-check-label" for="tech">Technology</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="design" />
                  <label class="form-check-label" for="design">Design</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="marketing" />
                  <label class="form-check-label" for="marketing">Marketing</label>
                </div>
              </div>

              <!-- Terms checkbox -->
              <div class="mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="terms" required />
                  <label class="form-check-label" for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                  </label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100">Create Account</button>
              <p class="text-center text-muted mt-3 mb-0">Already have an account? <a href="#">Log in</a></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePwd').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      if (pwd.type === 'password') { pwd.type = 'text'; this.textContent = 'Hide'; }
      else { pwd.type = 'password'; this.textContent = 'Show'; }
    });
  </script>
</body>
</html>
